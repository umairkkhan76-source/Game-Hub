<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - Game Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Reset Password</h2>
        <p id="msg" style="color:green;"></p>

        <label>New Password</label>
        <input type="password" id="password" placeholder="Enter new password" required><br><br>

        <label>Confirm Password</label>
        <input type="password" id="confirm" placeholder="Confirm new password" required>

        <button onclick="resetPassword()">Reset Password</button>

        <p><a href="/login">Back to Login</a></p>
    </div>

    <script>
    async function resetPassword() {
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;

        if (password !== confirm) {
            document.getElementById('msg').style.color = 'red';
            document.getElementById('msg').textContent = 'Passwords do not match!';
            return;
        }

        const token = window.location.pathname.split('/').pop();

        const response = await fetch(window.location.pathname, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: password, token: token })
        });

        const data = await response.json();
        document.getElementById('msg').style.color = data.success ? 'green' : 'red';
        document.getElementById('msg').textContent = data.message;

        if (data.success) {
            setTimeout(() => window.location.href = '/login', 2000);
        }
    }
    </script>
</body>
</html>
